<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in — CVbykiyomi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue:#2F6BFF;--blue-hover:#1A57F0;--blue-light:#EAF1FF;--blue-mid:#C7D9FF;
      --bg:#FAFBFF;--white:#FFFFFF;
      --text-1:#1A1A1A;--text-2:#6B7280;--text-3:#9CA3AF;
      --border:#E5E7EB;--border-md:#D1D5DB;
      --red:#DC2626;--red-light:#FEF2F2;
      --green:#059669;--green-light:#D1FAE5;
      --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
      --shadow-blue:0 4px 20px rgba(47,107,255,0.22);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

    nav{background:rgba(250,251,255,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:64px;padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:1.05rem;font-weight:700;color:var(--text-1);text-decoration:none;letter-spacing:-0.02em;display:flex;align-items:center;gap:0.4rem}
    .logo-mark{width:26px;height:26px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:700;color:#fff}

    .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem}
    .auth-card{background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-md);padding:2.8rem;width:100%;max-width:420px;animation:fadeUp 0.4s ease}

    .auth-logo{display:flex;justify-content:center;margin-bottom:2rem}
    .auth-logo-mark{width:44px;height:44px;border-radius:12px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;box-shadow:var(--shadow-blue)}

    .auth-title{font-size:1.5rem;font-weight:700;letter-spacing:-0.025em;color:var(--text-1);text-align:center;margin-bottom:0.4rem}
    .auth-sub{font-size:0.84rem;color:var(--text-2);text-align:center;margin-bottom:2rem;line-height:1.6}

    .tabs{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:2rem;gap:2px}
    .tab-btn{flex:1;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.84rem;font-weight:500;padding:0.52rem;border-radius:7px;cursor:pointer;border:none;background:none;color:var(--text-2);transition:all 0.18s}
    .tab-btn.active{background:var(--white);color:var(--blue);font-weight:600;box-shadow:var(--shadow-sm)}

    .fg{display:flex;flex-direction:column;gap:0.38rem;margin-bottom:1.1rem}
    label{font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-2)}
    input{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.92rem;font-weight:400;padding:0.75rem 1rem;border:1.5px solid var(--border);background:var(--white);color:var(--text-1);border-radius:8px;outline:none;width:100%;transition:border-color 0.2s,box-shadow 0.2s}
    input::placeholder{color:var(--text-3)}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(47,107,255,0.12)}
    input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,0.1)}

    .err-msg{font-size:0.76rem;color:var(--red);background:var(--red-light);border:1px solid rgba(220,38,38,0.2);padding:0.65rem 0.9rem;border-radius:7px;margin-bottom:1rem;display:none}
    .err-msg.show{display:block}
    .ok-msg{font-size:0.76rem;color:var(--green);background:var(--green-light);border:1px solid rgba(5,150,105,0.2);padding:0.65rem 0.9rem;border-radius:7px;margin-bottom:1rem;display:none}
    .ok-msg.show{display:block}

    .btn-submit{width:100%;background:var(--blue);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.94rem;font-weight:600;padding:0.85rem;border-radius:8px;cursor:pointer;transition:all 0.22s;box-shadow:var(--shadow-blue);display:flex;align-items:center;justify-content:center;gap:0.45rem}
    .btn-submit:hover{background:var(--blue-hover);transform:translateY(-1px);box-shadow:0 8px 24px rgba(47,107,255,0.35)}
    .btn-submit:active{transform:scale(0.98)}

    .auth-footer{text-align:center;margin-top:1.5rem;font-size:0.78rem;color:var(--text-3)}
    .auth-footer a{color:var(--blue);font-weight:600;text-decoration:none}

    .demo-notice{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.4rem;font-size:0.74rem;color:var(--text-2);line-height:1.5}
    .demo-notice strong{color:var(--blue)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><div class="logo-mark">CV</div>CVbykiyomi</a>
  <a href="index.html" style="font-size:0.82rem;font-weight:500;color:var(--text-2);text-decoration:none;padding:0.4rem 0.75rem;border-radius:6px;transition:all 0.18s" onmouseover="this.style.background='var(--blue-light)'" onmouseout="this.style.background=''">← Back to home</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-mark">CV</div></div>
    <h1 class="auth-title" id="authTitle">Welcome back</h1>
    <p class="auth-sub" id="authSub">Sign in to access your saved CVs and applications.</p>

    <div class="tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Log in</button>
      <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Create account</button>
    </div>

    <div class="demo-notice">
      <strong>Demo mode:</strong> Accounts are stored locally in your browser. No server, no email verification — just create and go.
    </div>

    <div class="err-msg" id="errMsg"></div>
    <div class="ok-msg" id="okMsg"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="fg">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Your password"/>
      </div>
      <button class="btn-submit" onclick="doLogin()">Sign in →</button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" style="display:none">
      <div class="fg">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Alexandra Okafor"/>
      </div>
      <div class="fg">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com"/>
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="signupPass" placeholder="At least 6 characters"/>
      </div>
      <button class="btn-submit" onclick="doSignup()">Create account →</button>
    </div>

    <p class="auth-footer" id="authSwitch">
      Don't have an account? <a href="#" onclick="switchTab('signup');return false">Sign up free</a>
    </p>
  </div>
</div>

<script>
  // Check if already logged in
  try {
    const u = JSON.parse(localStorage.getItem('cvk_user'));
    if (u) window.location.href = 'dashboard.html';
  } catch(e) {}

  // Check URL param
  const params = new URLSearchParams(location.search);
  if (params.get('mode') === 'signup') switchTab('signup');

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('signupForm').style.display = isLogin ? 'none' : 'block';
    document.getElementById('authTitle').textContent = isLogin ? 'Welcome back' : 'Create your account';
    document.getElementById('authSub').textContent = isLogin
      ? 'Sign in to access your saved CVs and applications.'
      : 'Free forever. No credit card needed.';
    document.getElementById('authSwitch').innerHTML = isLogin
      ? `Don't have an account? <a href="#" onclick="switchTab('signup');return false">Sign up free</a>`
      : `Already have an account? <a href="#" onclick="switchTab('login');return false">Log in</a>`;
    clearMsgs();
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('okMsg').classList.remove('show');
  }
  function showOk(msg) {
    const el = document.getElementById('okMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('errMsg').classList.remove('show');
  }
  function clearMsgs() {
    document.getElementById('errMsg').classList.remove('show');
    document.getElementById('okMsg').classList.remove('show');
  }

  function getAccounts() {
    try { return JSON.parse(localStorage.getItem('cvk_accounts')) || {}; } catch(e) { return {}; }
  }
  function saveAccounts(a) { localStorage.setItem('cvk_accounts', JSON.stringify(a)); }

  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pass  = document.getElementById('loginPass').value;
    if (!email || !pass) { showErr('Please enter your email and password.'); return; }
    const accounts = getAccounts();
    const account  = accounts[email];
    if (!account || account.password !== pass) { showErr('Incorrect email or password.'); return; }
    localStorage.setItem('cvk_user', JSON.stringify({ email, name: account.name, id: account.id }));
    showOk('Signed in! Redirecting…');
    setTimeout(() => window.location.href = 'dashboard.html', 700);
  }

  function doSignup() {
    const name  = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim().toLowerCase();
    const pass  = document.getElementById('signupPass').value;
    if (!name)  { showErr('Please enter your full name.'); return; }
    if (!email || !email.includes('@')) { showErr('Please enter a valid email.'); return; }
    if (pass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
    const accounts = getAccounts();
    if (accounts[email]) { showErr('An account with this email already exists. Log in instead.'); return; }
    const id = 'u_' + Date.now();
    accounts[email] = { name, password: pass, id };
    saveAccounts(accounts);
    localStorage.setItem('cvk_user', JSON.stringify({ email, name, id }));
    showOk('Account created! Redirecting…');
    setTimeout(() => window.location.href = 'dashboard.html', 700);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doSignup();
  });
</script>
</body>
</html>
