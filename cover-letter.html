<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cover Letter — CVbykiyomi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1a18;
      --paper: #f5f2ec;
      --cream: #ede9e0;
      --accent: #b5865a;
      --muted: #8a8880;
      --line: #d8d3c8;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
    }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    .toolbar-actions { display: flex; gap: 0.8rem; align-items: center; }
    .btn-outline {
      background: none;
      border: 1.5px solid var(--line);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      border-radius: 2px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: var(--ink); color: var(--ink); }
    .btn-solid {
      background: var(--ink);
      color: white;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.65rem 1.4rem;
      cursor: pointer;
      border-radius: 2px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s;
    }
    .btn-solid:hover { background: var(--accent); }

    /* PREVIEW */
    .preview-wrapper {
      padding: 3rem;
      display: flex;
      justify-content: center;
    }

    /* LETTER DOCUMENT */
    .letter-document {
      width: 210mm;
      min-height: 297mm;
      background: white;
      box-shadow: 0 4px 40px rgba(26,26,24,0.12);
      padding: 4rem 4.5rem;
      position: relative;
    }

    /* Letterhead */
    .letter-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid var(--ink);
    }
    .letter-sender-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--ink);
    }
    .letter-sender-contact {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.3rem;
      line-height: 1.7;
    }
    .letter-date {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
    }

    /* Recipient */
    .letter-recipient {
      margin-bottom: 2rem;
    }
    .letter-recipient p {
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--ink);
    }
    .letter-recipient .company-name {
      font-weight: 500;
    }

    /* Subject line */
    .letter-subject {
      margin-bottom: 1.8rem;
    }
    .letter-subject p {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Body */
    .letter-body p {
      font-size: 0.82rem;
      line-height: 1.85;
      color: #333;
      margin-bottom: 1.2rem;
    }

    /* Sign-off */
    .letter-signoff {
      margin-top: 2.5rem;
    }
    .letter-signoff p {
      font-size: 0.82rem;
      color: #333;
      margin-bottom: 0.3rem;
    }
    .letter-sig {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      margin-top: 1.2rem;
      color: var(--ink);
    }

    /* Accent mark */
    .letter-accent-mark {
      width: 40px;
      height: 3px;
      background: var(--accent);
      margin-bottom: 2.5rem;
    }

    @media print {
      @page { margin: 0; size: A4; }
      body { background: white; }
      .toolbar { display: none; }
      .preview-wrapper { padding: 0; }
      .letter-document { box-shadow: none; width: 100%; }
    }

    @media (max-width: 900px) {
      .toolbar { padding: 1rem 1.2rem; }
      .preview-wrapper { padding: 1rem; }
      .letter-document { width: 100%; padding: 2.5rem 2rem; }
      .letter-head { flex-direction: column; gap: 1rem; }
      .letter-date { text-align: left; }
    }
  </style>
</head>
<body>

<div class="toolbar">
  <a href="index.html" class="logo">CV<span>bykiyomi</span></a>
  <div class="toolbar-actions">
    <a href="cv-preview.html" class="btn-outline">← View CV</a>
    <button class="btn-solid" onclick="window.print()">⬇ Print / Download</button>
    <a href="form.html" class="btn-outline">Edit Details</a>
  </div>
</div>

<div class="preview-wrapper">
  <div class="letter-document" id="letter-document">
    <!-- Injected by JS -->
  </div>
</div>

<script>
  const raw = sessionStorage.getItem('cvData');
  const data = raw ? JSON.parse(raw) : null;

  if (!data) {
    document.getElementById('letter-document').innerHTML = `
      <div style="padding:4rem;text-align:center;color:#8a8880;">
        <p style="font-size:1.1rem;margin-bottom:1rem;">No CV data found.</p>
        <a href="form.html" style="color:#b5865a;font-size:0.9rem;">← Go back and fill in your details</a>
      </div>`;
  } else {
    renderLetter(data);
  }

  function extractJobTitle(jd, override) {
    if (override && override.length > 2) return override;
    const lines = jd.split('\n').map(l => l.trim()).filter(Boolean);
    // Try to find a line that looks like a job title (short, no punctuation)
    for (const line of lines.slice(0, 6)) {
      if (line.length < 80 && !/[.:]$/.test(line)) return line;
    }
    return 'the advertised position';
  }

  function extractSkillsFromJD(jd, userSkills) {
    if (!userSkills || userSkills.length === 0) return [];
    return userSkills.filter(s => jd.toLowerCase().includes(s.toLowerCase())).slice(0, 3);
  }

  function getTodayDate() {
    return new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function renderLetter(d) {
    const fullName = `${d.firstName} ${d.lastName}`.trim();
    const jobTitle = extractJobTitle(d.jobDesc, d.jobTitle);
    const company = d.companyName || 'your organisation';
    const matchedSkills = extractSkillsFromJD(d.jobDesc, d.skills);

    const contactLine = [d.location, d.email, d.phone].filter(Boolean).join(' · ');

    // Pick top experience
    const topExp = d.experience.find(e => e.role && e.company);
    const expLine = topExp
      ? `In my most recent role as <strong>${topExp.role}</strong> at <strong>${topExp.company}</strong>, I ${topExp.desc ? descToSentence(topExp.desc) : 'developed strong expertise in delivering results across key areas'}.`
      : '';

    // Skills sentence
    const skillsSentence = matchedSkills.length
      ? `My skills in <strong>${matchedSkills.join(', ')}</strong> align closely with what you are looking for.`
      : d.skills.length
        ? `My background encompasses <strong>${d.skills.slice(0, 3).join(', ')}</strong>, skills I am eager to bring to this role.`
        : '';

    // Summary usage
    const summaryPara = d.summary
      ? `<p>${d.summary}</p>`
      : '';

    document.getElementById('letter-document').innerHTML = `
      <div class="letter-head">
        <div>
          <div class="letter-sender-name">${fullName}</div>
          <div class="letter-sender-contact">${contactLine}</div>
        </div>
        <div class="letter-date">${getTodayDate()}</div>
      </div>

      <div class="letter-accent-mark"></div>

      <div class="letter-recipient">
        <p>The Hiring Manager</p>
        <p class="company-name">${company}</p>
      </div>

      <div class="letter-subject">
        <p>Re: Application for ${jobTitle}</p>
      </div>

      <div class="letter-body">
        <p>Dear Hiring Manager,</p>

        <p>I am writing to express my strong interest in the <strong>${jobTitle}</strong> position at <strong>${company}</strong>. With my background in ${d.skills.slice(0, 2).join(' and ') || 'my field'} and a track record of delivering meaningful results, I am confident I would make a valuable contribution to your team.</p>

        ${summaryPara}

        ${expLine ? `<p>${expLine}</p>` : ''}

        ${skillsSentence ? `<p>${skillsSentence} I am committed to continuous growth and thrive in environments that value initiative, collaboration, and impact.</p>` : ''}

        <p>I am particularly drawn to <strong>${company}</strong> because of the opportunity to work on meaningful challenges and contribute to a high-performing team. I am excited by the prospect of bringing my skills and experience to this role and growing within your organisation.</p>

        <p>I would welcome the opportunity to discuss how my background aligns with your needs. Please find my CV attached, and I look forward to the possibility of speaking with you.</p>
      </div>

      <div class="letter-signoff">
        <p>Yours sincerely,</p>
        <div class="letter-sig">${fullName}</div>
        ${d.email ? `<p style="font-size:0.75rem;color:#8a8880;margin-top:0.3rem;">${d.email}${d.phone ? ' · ' + d.phone : ''}</p>` : ''}
      </div>
    `;
  }

  function descToSentence(desc) {
    const first = desc.split('\n').find(l => l.trim().length > 10) || '';
    const cleaned = first.replace(/^[•\-–·]\s*/, '').toLowerCase().replace(/\.$/, '');
    return cleaned || 'consistently delivered high-impact outcomes';
  }
</script>
</body>
</html>
