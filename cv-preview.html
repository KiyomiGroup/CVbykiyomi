<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your CV — CVbykiyomi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F8F7F5;--bg-card:#FFFFFF;--bg-subtle:#F2F1EE;
      --border:#E8E6E1;--border-md:#D6D3CC;
      --text-1:#111111;--text-2:#6B6B6B;--text-3:#9A9A9A;
      --shadow-sm:0 1px 4px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.04);
      --shadow-md:0 2px 12px rgba(0,0,0,0.07),0 6px 24px rgba(0,0,0,0.05);
      --shadow-lg:0 8px 40px rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.05);
      --r:10px;--r-sm:6px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased}

    /* TOOLBAR */
    .toolbar{
      position:sticky;top:0;z-index:100;
      background:rgba(248,247,245,0.92);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      height:60px;padding:0 2.5rem;
      display:flex;align-items:center;justify-content:space-between;
    }
    .logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:var(--text-1);text-decoration:none;letter-spacing:-0.01em}
    .logo em{font-style:italic;font-weight:400}
    .tb-right{display:flex;align-items:center;gap:0.6rem}
    /* tab toggle */
    .tab-group{display:flex;background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px}
    .tab{font-family:'Plus Jakarta Sans',sans-serif;font-size:0.74rem;font-weight:500;padding:0.35rem 0.9rem;border-radius:4px;cursor:pointer;color:var(--text-2);text-decoration:none;transition:all 0.18s;background:none;border:none}
    .tab.active,.tab:hover{background:var(--bg-card);color:var(--text-1);box-shadow:var(--shadow-sm)}
    .btn-tb{
      font-family:'Plus Jakarta Sans',sans-serif;font-size:0.76rem;font-weight:600;
      padding:0.5rem 1.1rem;border-radius:var(--r-sm);cursor:pointer;
      text-decoration:none;display:inline-flex;align-items:center;gap:0.35rem;transition:all 0.2s;
    }
    .btn-solid{background:var(--text-1);color:#fff;border:none;box-shadow:var(--shadow-sm)}
    .btn-solid:hover{background:#3D3D3D;box-shadow:var(--shadow-md);transform:translateY(-1px)}
    .btn-outline{color:var(--text-2);background:var(--bg-card);border:1.5px solid var(--border-md)}
    .btn-outline:hover{color:var(--text-1);border-color:var(--text-1)}

    /* WRAPPER */
    .preview-wrap{padding:2.5rem;display:flex;justify-content:center}

    /* ══════════════════════════════════════
       THE CV DOCUMENT  (white, print-safe)
    ══════════════════════════════════════ */
    .cv-doc{
      width:210mm;min-height:297mm;
      background:#FFFFFF;
      box-shadow:var(--shadow-lg);
      border-radius:4px;overflow:hidden;
      font-family:'Plus Jakarta Sans',sans-serif;
    }

    /* Header band */
    .cv-hd{
      background:#111111;
      padding:2.4rem 2.8rem 2rem;
      color:#F0EDE8;
    }
    .cv-name{
      font-family:'Playfair Display',serif;
      font-size:2rem;font-weight:600;letter-spacing:-0.02em;
      margin-bottom:0.2rem;color:#F0EDE8;
    }
    .cv-jobtitle{
      font-size:0.7rem;font-weight:600;letter-spacing:0.12em;
      text-transform:uppercase;color:rgba(240,237,232,0.5);
      margin-bottom:1rem;
    }
    .cv-contact-row{display:flex;flex-wrap:wrap;gap:1.2rem;margin-top:0.6rem}
    .cv-ci{font-size:0.7rem;color:rgba(240,237,232,0.65);display:flex;align-items:center;gap:0.25rem}
    .cv-ci a{color:rgba(240,237,232,0.65);text-decoration:none}

    /* Body 2-col */
    .cv-body{display:grid;grid-template-columns:190px 1fr}
    .cv-left{background:#F7F5F1;padding:1.8rem 1.6rem;border-right:1px solid #E8E6E1}
    .cv-right{padding:1.8rem 2.2rem}

    /* Section styles */
    .cv-sec{margin-bottom:1.6rem}
    .cv-sec-t{
      font-size:0.55rem;font-weight:700;letter-spacing:0.16em;
      text-transform:uppercase;color:#9A9A9A;
      padding-bottom:0.4rem;margin-bottom:0.8rem;
      border-bottom:1.5px solid #E8E6E1;
    }

    /* Summary */
    .cv-summary{font-size:0.78rem;line-height:1.75;color:#444;font-weight:300}

    /* Skills */
    .cv-skill{
      display:block;font-size:0.73rem;color:#333;
      padding:0.28rem 0;border-bottom:1px solid #EEE;line-height:1.4;
    }
    .cv-skill:last-child{border-bottom:none}

    /* Education */
    .cv-edu{margin-bottom:0.75rem}
    .cv-edu-d{font-size:0.74rem;font-weight:500;color:#222}
    .cv-edu-s{font-size:0.68rem;color:#9A9A9A;margin-top:0.08rem}

    /* Experience */
    .cv-exp{margin-bottom:1.5rem}
    .cv-exp:last-child{margin-bottom:0}
    .cv-exp-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.2rem}
    .cv-exp-role{font-size:0.85rem;font-weight:600;color:#111}
    .cv-exp-dates{font-size:0.66rem;color:#9A9A9A;white-space:nowrap;padding-top:0.1rem}
    .cv-exp-co{font-size:0.7rem;font-weight:500;color:#6B6B6B;margin-bottom:0.45rem}
    .cv-exp-list{padding:0;list-style:none}
    .cv-exp-list li{
      font-size:0.74rem;line-height:1.7;color:#444;font-weight:300;
      padding-left:0.9rem;position:relative;margin-bottom:0.18rem;
    }
    .cv-exp-list li::before{content:'·';position:absolute;left:0;color:#9A9A9A;font-size:1rem;line-height:1.55}

    /* ── PRINT ── */
    @media print{
      @page{margin:0;size:A4}
      body{background:#fff}
      .toolbar{display:none}
      .preview-wrap{padding:0}
      .cv-doc{box-shadow:none;width:100%;border-radius:0}
    }
    @media(max-width:900px){
      .toolbar{padding:0 1.2rem}
      .preview-wrap{padding:1rem}
      .cv-doc{width:100%}
      .cv-body{grid-template-columns:1fr}
      .cv-left{border-right:none;border-bottom:1px solid #E8E6E1}
    }
  </style>
</head>
<body>

<div class="toolbar">
  <a href="index.html" class="logo">CV<em>bykiyomi</em></a>
  <div class="tb-right">
    <div class="tab-group">
      <span class="tab active">CV</span>
      <a href="cover-letter.html" class="tab">Cover Letter</a>
    </div>
    <button class="btn-tb btn-solid" onclick="window.print()">⬇ Print / Download</button>
    <a href="form.html" class="btn-tb btn-outline">Edit ↩</a>
  </div>
</div>

<div class="preview-wrap">
  <div class="cv-doc" id="cv-doc"></div>
</div>

<script>
  const raw=sessionStorage.getItem('cvData');
  const d=raw?JSON.parse(raw):null;
  const el=document.getElementById('cv-doc');

  if(!d){
    el.innerHTML=`<div style="padding:4rem;text-align:center;color:#9A9A9A"><p style="margin-bottom:1rem;font-size:1rem">No CV data found.</p><a href="form.html" style="color:#111;font-size:0.88rem;font-weight:600">← Fill in your details</a></div>`;
  } else { renderCV(d); }

  function renderCV(d){
    const name=`${d.firstName} ${d.lastName}`.trim();
    const contacts=[
      d.email?`<span class="cv-ci">✉ ${d.email}</span>`:'',
      d.phone?`<span class="cv-ci">☎ ${d.phone}</span>`:'',
      d.location?`<span class="cv-ci">⌖ ${d.location}</span>`:'',
      d.linkedin?`<span class="cv-ci">⊕ <a href="${d.linkedin}" target="_blank">${d.linkedin.replace(/^https?:\/\//,'')}</a></span>`:'',
    ].filter(Boolean).join('');

    const skills=d.skills.length
      ?d.skills.map(s=>`<span class="cv-skill">${s}</span>`).join('')
      :`<span class="cv-skill" style="color:#ccc">None added</span>`;

    const edu=(d.education?d.education.split('\n').filter(Boolean):[])
      .map(l=>`<div class="cv-edu"><div class="cv-edu-d">${l}</div></div>`).join('')
      ||`<div class="cv-edu"><div class="cv-edu-d" style="color:#ccc">Not provided</div></div>`;

    const exps=d.experience.filter(e=>e.role||e.company).map(e=>{
      const bullets=e.desc?e.desc.split('\n').filter(Boolean).map(b=>`<li>${b.replace(/^[•\-–·]\s*/,'')}</li>`).join(''):'';
      return `<div class="cv-exp">
        <div class="cv-exp-hd">
          <div class="cv-exp-role">${e.role||'Role'}</div>
          <div class="cv-exp-dates">${[e.start,e.end].filter(Boolean).join(' – ')}</div>
        </div>
        <div class="cv-exp-co">${e.company||''}</div>
        ${bullets?`<ul class="cv-exp-list">${bullets}</ul>`:''}
      </div>`;
    }).join('')||`<p style="font-size:0.78rem;color:#ccc">No experience added</p>`;

    const summary=d.summary?`<div class="cv-sec"><div class="cv-sec-t">Profile</div><p class="cv-summary">${d.summary}</p></div>`:'';

    el.innerHTML=`
      <div class="cv-hd">
        <div class="cv-name">${name}</div>
        <div class="cv-jobtitle">${d.jobTitle||'Professional'}</div>
        <div class="cv-contact-row">${contacts}</div>
      </div>
      <div class="cv-body">
        <div class="cv-left">
          <div class="cv-sec"><div class="cv-sec-t">Skills</div>${skills}</div>
          <div class="cv-sec"><div class="cv-sec-t">Education</div>${edu}</div>
        </div>
        <div class="cv-right">
          ${summary}
          <div class="cv-sec"><div class="cv-sec-t">Experience</div>${exps}</div>
        </div>
      </div>`;
  }
</script>
</body>
</html>
